<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>天天嘴台灣 TDT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a1525;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-family: "Consolas", "Courier New", monospace;
    }
    #header {
      /* Phase 3 Step 6.7: TDT 標題拿掉、LIVE 改放進 LED badge */
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      border-bottom: 1px solid rgba(255,107,53,0.3);
      background: linear-gradient(90deg, #1a0d05 0%, #0a0805 100%);
      flex-shrink: 0;
    }
    /* Phase 3 Step 6.7: LED badge 顯示「● LIVE」時、紅點閃爍 */
    #led-mode-badge.discussing::before {
      content: "● ";
      color: #FF3535;
      text-shadow: 0 0 8px rgba(255,53,53,0.9);
      animation: blink 1.5s ease-in-out infinite;
    }
    #header .title {
      color: #FF6B35;
      font-size: 21px;
      letter-spacing: 4px;
      font-weight: 600;
      text-shadow: 0 0 10px rgba(255,107,53,0.6);
    }
    #header .subtitle {
      color: #6E8AA8;
      font-size: 13px;
      letter-spacing: 1.5px;
      opacity: 0.7;
    }
    #header .live {
      color: #00E676;
      font-size: 13px;
      letter-spacing: 1.5px;
    }
    #header .live::before {
      content: "● ";
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #game-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #game-container canvas {
      display: block;
    }
    #status-panel {
      /* Phase 3 Step 6.7: 24H MVP 過渡、右上 panel 隱藏 (62 notes item 6 + 10 決議) */
      /* 等 24H AI LIVE 品牌字素材到位後改用品牌 UI */
      display: none;
      position: absolute;
      top: 10px;
      right: 10px;
      width: 210px;
      background: rgba(8,12,22,0.88);
      border: 1px solid rgba(255,107,53,0.18);
      border-radius: 4px;
      padding: 14px;
      color: #C8DDF0;
      font-size: 13px;
      line-height: 1.6;
      pointer-events: none;
    }
    #status-panel .panel-title {
      color: #CC6428;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,107,53,0.15);
      padding-bottom: 6px;
      margin-bottom: 8px;
    }
    .module-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.idle         { background: #3a5068; }
    .status-dot.talking      { background: #FF6B35; animation: blink 0.8s infinite; }
    .status-dot.reacting     { background: #FFB300; animation: blink 0.8s infinite; }
    .status-dot.thinking     { background: #BB86FC; animation: blink 1s infinite; }
    .status-dot.researching  { background: #00E5FF; animation: blink 1s infinite; }
    .status-dot.coffee_break { background: #A0C878; }
    .status-dot.meeting      { background: #BB86FC; }
    .status-dot.walking      { background: #80DEEA; animation: blink 1.2s infinite; }
    /* 舊狀態保留避免 JS 參照失效 */
    .status-dot.running { background: #FFB300; animation: blink 0.8s infinite; }
    .status-dot.done    { background: #00E676; }
    .status-dot.live    { background: #00E5FF; animation: blink 1.2s infinite; }
    .module-name { color: #A8C0D8; flex: 1; }
    .module-output { color: #6E8AA8; font-size: 12px; margin-left: 13px; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #update-time { color: #3a5068; font-size: 12px; margin-top: 8px; border-top: 1px solid rgba(0,229,255,0.1); padding-top: 6px; }

    /* ── 持倉損益面板 ── */
    #portfolio-panel {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: 260px;
      background: rgba(10,21,37,0.92);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 4px;
      padding: 10px;
      color: #D8EEFB;
      font-size: 13px;
      pointer-events: none;
      display: none;
    }
    #portfolio-panel .panel-title {
      color: #00E5FF;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(0,229,255,0.15);
      padding-bottom: 6px;
      margin-bottom: 8px;
    }
    .port-summary {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(0,229,255,0.1);
    }
    .port-summary .label { color: #6E8AA8; font-size: 12px; }
    .port-summary .value { font-size: 14px; font-weight: bold; }
    .port-summary .pos { color: #00E676; }
    .port-summary .neg { color: #FF5252; }
    .port-summary .neu { color: #D8EEFB; }
    .pos-row {
      display: grid;
      grid-template-columns: 44px 28px 1fr 1fr;
      gap: 2px 4px;
      align-items: center;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .pos-sym { color: #00E5FF; font-weight: bold; }
    .pos-sh  { color: #6E8AA8; text-align: right; }
    .pos-price { color: #A8C0D8; text-align: right; }
    .pos-pnl   { text-align: right; font-weight: bold; }
    .pos-pnl.pos { color: #00E676; }
    .pos-pnl.neg { color: #FF5252; }

    /* ── F2 Debug Overlay ── */
    #debug-overlay {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 230px;
      background: rgba(0, 8, 4, 0.95);
      border: 1px solid rgba(0, 229, 100, 0.45);
      border-radius: 3px;
      padding: 10px 12px;
      color: #00E676;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.75;
      z-index: 999;
      pointer-events: none;
      display: none;
    }
    #debug-overlay .dbg-title {
      color: #00E5FF;
      font-size: 10px;
      letter-spacing: 3px;
      border-bottom: 1px solid rgba(0, 229, 100, 0.25);
      padding-bottom: 5px;
      margin-bottom: 7px;
    }
    #debug-overlay .dbg-row { color: #6E8AA8; }
    #debug-overlay .dbg-val { color: #00E676; }

    /* ── LED 螢幕 overlay ── */
    #led-overlay {
      position: absolute;
      /* Phase 3 Step 6.7: LED 從 56.5% 移到 50%（兩位主持人 35% / 65% 的中間）*/
      left: 50%;
      top: 27%;
      transform: translate(-50%, -50%);
      width: 26vw;
      height: calc(26vw * 9 / 16);
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding-top: 5%;
      gap: 8px;
      z-index: 10;
      opacity: 1;
      transition: opacity 0.35s ease;
    }
    #led-overlay.fading { opacity: 0; }
    #led-topic-label {
      color: #FF6B35;
      font-size: 1.2vw;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255,107,53,0.9);
      text-align: center;
      line-height: 1.3;
      max-width: 90%;
      padding: 4px 12px;
      background: rgba(20, 8, 3, 0.82);
      border: 1px solid rgba(255,107,53,0.5);
      border-radius: 2px;
    }
    #led-topic-text {
      color: #E8F4FF;
      font-size: 1.5vw;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-align: center;
      line-height: 1.4;
      max-width: 90%;
      text-shadow: 0 0 14px rgba(220,240,255,0.85), 0 0 30px rgba(100,180,255,0.4);
      padding: 6px 10px;
    }
    #led-mode-badge {
      font-size: 0.9vw;
      letter-spacing: 3px;
      padding: 3px 12px;
      border-radius: 2px;
      background: rgba(10, 20, 35, 0.85);
      border: 1px solid rgba(100,150,200,0.3);
      color: #6E8AA8;
    }
    #led-mode-badge.discussing {
      color: #FF6B35;
      border-color: rgba(255,107,53,0.6);
      text-shadow: 0 0 8px rgba(255,107,53,0.7);
      background: rgba(30, 8, 2, 0.85);
    }
    #led-mode-badge.working {
      color: #FFB300;
      border-color: rgba(255,179,0,0.55);
      text-shadow: 0 0 8px rgba(255,179,0,0.65);
      background: rgba(30, 22, 2, 0.85);
    }
    #led-mode-badge.coffee {
      color: #C8A07A;
      border-color: rgba(200,160,122,0.55);
      text-shadow: 0 0 8px rgba(200,160,122,0.5);
      background: rgba(24, 18, 12, 0.85);
    }
    /* Phase 4 Step 2.1: 24H AI LIVE 品牌字 badge (左上、縮小+往內挪、不搶舞台)
       Step 5.25+: badge 同時當隱藏 BGM 開關（觀眾看不出來、自己知道點哪）*/
    #brand-badge {
      position: absolute;
      top: 24px;
      left: 24px;
      width: 220px;
      height: 51px;
      background: url('/assets/ui_brand_24h_ai_live.png') no-repeat;
      background-size: contain;
      z-index: 11;
      pointer-events: auto;
      cursor: pointer;
      filter: drop-shadow(0 0 6px rgba(255,107,53,0.35));
      opacity: 0.92;
    }
    /* Phase 4 Step 2: 跑馬燈 (底部、循環滾動) */
    #marquee-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: url('/assets/ui_marquee_bg.png') no-repeat center center;
      background-size: cover;
      overflow: hidden;
      z-index: 12;
      pointer-events: none;
      display: flex;
      align-items: center;
    }
    #marquee-bar .marquee-text {
      display: inline-block;
      white-space: nowrap;
      padding-left: 100%;
      animation: marquee 40s linear infinite;
      color: #FFB300;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 5px;
      font-family: "Microsoft JhengHei", "Consolas", monospace;
      text-shadow: 0 0 10px rgba(255,179,0,0.7);
    }
    @keyframes marquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
    /* Step 5.34: 搞笑梗快訊模式（聲音掛掉時、紅字 + 跑快一點） */
    #marquee-bar.alert {
      background-image: none;
      background-color: rgba(40, 6, 6, 0.92);
      border-top: 2px solid rgba(255,82,82,0.7);
    }
    #marquee-bar.alert .marquee-text {
      color: #FF6B6B;
      text-shadow: 0 0 12px rgba(255,82,82,0.85);
      animation-duration: 26s;
    }
  </style>
</head>
<body>
  <div id="header">
    <div>
      <div class="title">◆ 天天嘴台灣 TDT</div>
      <div class="subtitle">AI 鄉民聊天室 • Taiwan Daily Talk LIVE</div>
    </div>
    <div class="live" id="live-status">LIVE</div>
  </div>
  <!-- Phase 4 Step 2: 24H AI LIVE 品牌字 + 跑馬燈 overlay -->
  <div id="brand-badge"></div>
  <div id="marquee-bar">
    <span class="marquee-text">
      ◆ 天天嘴台灣 · Taiwan Daily Talk · 純 AI 生成內容 · 24/7 LIVE Chat · AI 主持人不打烊 · 按讚 + 訂閱 + 小鈴鐺 · 留言告訴主持人 · 歡迎分享給朋友 ·&nbsp;&nbsp;&nbsp;
    </span>
  </div>
  <div id="game-container">
    <div id="status-panel">
      <div class="panel-title">今日話題</div>
      <div id="module-list"></div>
      <div id="update-time">— 等待資料 —</div>
    </div>
    <div id="led-overlay">
      <div id="led-topic-label">📌 目前話題</div>
      <div id="led-topic-text">—</div>
      <div id="led-mode-badge">STANDBY</div>
    </div>
    <div id="debug-overlay">
      <div class="dbg-title">▸ DEBUG  [F2 to hide]</div>
      <div id="dbg-content"></div>
    </div>
    <div id="portfolio-panel" style="display:none">
      <div class="panel-title">Portfolio · 模擬帳戶</div>
      <div id="port-summary"></div>
      <div id="port-positions"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js?v=9"></script>

  <script>
    (function ledOverlay() {
      const overlay = document.getElementById('led-overlay');
      const label   = document.getElementById('led-topic-label');
      const text    = document.getElementById('led-topic-text');
      const badge   = document.getElementById('led-mode-badge');

      // Step 5.34: 跑馬燈快訊（搞笑梗）—— state.ticker 有值時覆蓋預設促銷文字
      const marqueeBar  = document.getElementById('marquee-bar');
      const marqueeText = marqueeBar.querySelector('.marquee-text');
      const MARQUEE_DEFAULT = marqueeText.textContent;
      let lastTicker = '';
      function updateMarquee(ticker) {
        ticker = (ticker || '').trim();
        if (ticker === lastTicker) return;       // 沒變不動（避免每 3 秒重設動畫）
        lastTicker = ticker;
        if (ticker) {
          const seg = '📢 ' + ticker + '　　　';
          marqueeText.textContent = seg + seg + seg;   // 重複填滿跑馬燈
          marqueeBar.classList.add('alert');
        } else {
          marqueeText.textContent = MARQUEE_DEFAULT;
          marqueeBar.classList.remove('alert');
        }
      }

      // mode → LED 顯示模板（依 GPT Phase 2C Step 4 指令）
      const MODE_VIEWS = {
        idle:       { label: '◆ TDT  Taiwan Daily Talk', text: '天天嘴台灣',  badge: 'STANDBY',      badgeClass: '' },
        discussion: { label: '📌 目前話題',             text: null,           badge: 'LIVE',         badgeClass: 'discussing' },
        working:    { label: '⚙ 後台準備中',            text: '準備下一話題',  badge: 'WORKING',      badgeClass: 'working' },
        coffee:     { label: '☕ 休息片刻',               text: '茶水間閒聊',   badge: 'COFFEE BREAK', badgeClass: 'coffee' },
      };

      let lastMode  = null;
      let lastTopic = null;

      function applyView(mode, topic) {
        const view = MODE_VIEWS[mode] || MODE_VIEWS.idle;
        label.textContent = view.label;
        // discussion 時用實際 topic（空則退回標題）、其他 mode 用各自固定文字
        text.textContent  = mode === 'discussion' ? (topic || '尚未設定話題') : view.text;
        badge.textContent = view.badge;
        badge.className   = 'led-mode-badge ' + view.badgeClass;
      }

      // 統一換 LED 內容：首次直接套、之後淡出→換→淡入。沒變則不動。
      function showView(mode, topic) {
        if (mode === lastMode && topic === lastTopic) return;
        if (lastMode === null) {
          applyView(mode, topic);
        } else {
          overlay.classList.add('fading');
          setTimeout(() => {
            applyView(mode, topic);
            overlay.classList.remove('fading');
          }, 350);
        }
        lastMode  = mode;
        lastTopic = topic;
      }

      // Step 5.42: 讓 Phaser 場景「開口前」直接把話題推上 LED（不等 3 秒 poll）。
      //   配合 OfficeScene 的 lead delay → 話題先出來、對話再出來。
      window.tdtShowTopic = (topic) => showView('discussion', topic || '');

      async function poll() {
        try {
          const r = await fetch('/api/state');
          const d = await r.json();
          updateMarquee(d.ticker);   // Step 5.34: 跑馬燈快訊（每次都檢查、不受下面 early-return 影響）
          const mode  = d.mode  || 'idle';
          // Phase 4 Step 5.6: 優先顯示角色「正在講的話題」、不是排隊中的下一話題
          const topic = d.speaking_topic || d.topic || '';
          showView(mode, topic);     // 場景已推過就 no-op（lastTopic 一致）、poll 只負責 mode/補漏
        } catch (_) {}
      }
      poll();
      setInterval(poll, 3000);
    })();
  </script>

  <script>
    (function debugOverlay() {
      const panel   = document.getElementById('debug-overlay');
      const content = document.getElementById('dbg-content');
      let visible = false;
      let cached  = null;

      document.addEventListener('keydown', function(e) {
        if (e.key !== 'F2') return;
        e.preventDefault();
        visible = !visible;
        panel.style.display = visible ? 'block' : 'none';
        if (visible) render();
      });

      function render() {
        if (!cached) {
          content.innerHTML = '<span style="color:#3a5068">— waiting —</span>';
          return;
        }
        const kws = Array.isArray(cached.keywords) && cached.keywords.length > 0
          ? cached.keywords.join(', ')
          : (cached.keywords ? String(cached.keywords) : '—');
        const rows = [
          ['mode',        cached.mode        || '—'],
          ['topic',       cached.topic       || '(none)'],
          ['keywords',    kws],
          ['last_update', cached.updated_at  || '—'],
          ['resolution',  '1920×1080'],
          ['scale',       'FIT'],
        ];
        content.innerHTML = rows.map(([k, v]) =>
          `<div><span class="dbg-row">${k}: </span><span class="dbg-val">${v}</span></div>`
        ).join('');
      }

      async function poll() {
        try {
          const r = await fetch('/api/state');
          if (r.ok) {
            cached = await r.json();
            if (visible) render();
          }
        } catch (_) {}
      }
      poll();
      setInterval(poll, 3000);
    })();
  </script>

  <script>
    // 24H AI LIVE badge 隱藏 BGM 開關（只有自己知道）
    document.getElementById('brand-badge').addEventListener('click', function() {
      const muted = localStorage.getItem('bgm_muted') === '1';
      localStorage.setItem('bgm_muted', muted ? '0' : '1');
      window.dispatchEvent(new CustomEvent('bgm-toggle', { detail: { muted: !muted } }));
    });
  </script>
</body>
</html>
