<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>AI Trading Command Center</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a1525;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-family: "Consolas", "Courier New", monospace;
    }
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      border-bottom: 1px solid rgba(0,229,255,0.2);
      background: linear-gradient(90deg, #0d1d33 0%, #0a1525 100%);
      flex-shrink: 0;
    }
    #header .title {
      color: #00E5FF;
      font-size: 15px;
      letter-spacing: 3px;
      font-weight: 600;
      text-shadow: 0 0 10px rgba(0,229,255,0.5);
    }
    #header .subtitle {
      color: #6E8AA8;
      font-size: 11px;
      letter-spacing: 1.5px;
    }
    #header .live {
      color: #00E676;
      font-size: 11px;
      letter-spacing: 1.5px;
    }
    #header .live::before {
      content: "● ";
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #game-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #game-container canvas {
      display: block;
    }
    #status-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 200px;
      background: rgba(10,21,37,0.92);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 4px;
      padding: 10px;
      color: #D8EEFB;
      font-size: 11px;
      pointer-events: none;
    }
    #status-panel .panel-title {
      color: #00E5FF;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(0,229,255,0.15);
      padding-bottom: 6px;
      margin-bottom: 8px;
    }
    .module-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.idle    { background: #3a5068; }
    .status-dot.running { background: #FFB300; animation: blink 0.8s infinite; }
    .status-dot.done    { background: #00E676; }
    .status-dot.live    { background: #00E5FF; animation: blink 1.2s infinite; }
    .status-dot.thinking{ background: #BB86FC; animation: blink 1s infinite; }
    .module-name { color: #A8C0D8; flex: 1; }
    .module-output { color: #6E8AA8; font-size: 10px; margin-left: 13px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #update-time { color: #3a5068; font-size: 10px; margin-top: 8px; border-top: 1px solid rgba(0,229,255,0.1); padding-top: 6px; }
  </style>
</head>
<body>
  <div id="header">
    <div>
      <div class="title">◆ AI TRADING COMMAND CENTER</div>
      <div class="subtitle">TAIWAN STOCK MARKET — REAL-TIME</div>
    </div>
    <div class="live" id="live-status">LIVE</div>
  </div>
  <div id="game-container">
    <div id="status-panel">
      <div class="panel-title">Module Status</div>
      <div id="module-list"></div>
      <div id="update-time">— 等待資料 —</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
