<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>晚晚嘴台灣 WWT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a1525;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-family: "Consolas", "Courier New", monospace;
    }
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      border-bottom: 1px solid rgba(255,107,53,0.3);
      background: linear-gradient(90deg, #1a0d05 0%, #0a0805 100%);
      flex-shrink: 0;
    }
    #header .title {
      color: #FF6B35;
      font-size: 21px;
      letter-spacing: 4px;
      font-weight: 600;
      text-shadow: 0 0 10px rgba(255,107,53,0.6);
    }
    #header .subtitle {
      color: #6E8AA8;
      font-size: 13px;
      letter-spacing: 1.5px;
      opacity: 0.7;
    }
    #header .live {
      color: #00E676;
      font-size: 13px;
      letter-spacing: 1.5px;
    }
    #header .live::before {
      content: "● ";
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #game-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #game-container canvas {
      display: block;
    }
    #status-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 200px;
      background: rgba(20,8,2,0.92);
      border: 1px solid rgba(255,107,53,0.25);
      border-radius: 4px;
      padding: 14px;
      color: #D8EEFB;
      font-size: 13px;
      line-height: 1.6;
      pointer-events: none;
    }
    #status-panel .panel-title {
      color: #FF6B35;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,107,53,0.2);
      padding-bottom: 6px;
      margin-bottom: 8px;
    }
    .module-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.idle         { background: #3a5068; }
    .status-dot.talking      { background: #FF6B35; animation: blink 0.8s infinite; }
    .status-dot.reacting     { background: #FFB300; animation: blink 0.8s infinite; }
    .status-dot.thinking     { background: #BB86FC; animation: blink 1s infinite; }
    .status-dot.researching  { background: #00E5FF; animation: blink 1s infinite; }
    .status-dot.coffee_break { background: #A0C878; }
    .status-dot.meeting      { background: #BB86FC; }
    .status-dot.walking      { background: #80DEEA; animation: blink 1.2s infinite; }
    /* 舊狀態保留避免 JS 參照失效 */
    .status-dot.running { background: #FFB300; animation: blink 0.8s infinite; }
    .status-dot.done    { background: #00E676; }
    .status-dot.live    { background: #00E5FF; animation: blink 1.2s infinite; }
    .module-name { color: #A8C0D8; flex: 1; }
    .module-output { color: #6E8AA8; font-size: 12px; margin-left: 13px; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #update-time { color: #3a5068; font-size: 12px; margin-top: 8px; border-top: 1px solid rgba(0,229,255,0.1); padding-top: 6px; }

    /* ── 持倉損益面板 ── */
    #portfolio-panel {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: 260px;
      background: rgba(10,21,37,0.92);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 4px;
      padding: 10px;
      color: #D8EEFB;
      font-size: 13px;
      pointer-events: none;
      display: none;
    }
    #portfolio-panel .panel-title {
      color: #00E5FF;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(0,229,255,0.15);
      padding-bottom: 6px;
      margin-bottom: 8px;
    }
    .port-summary {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(0,229,255,0.1);
    }
    .port-summary .label { color: #6E8AA8; font-size: 12px; }
    .port-summary .value { font-size: 14px; font-weight: bold; }
    .port-summary .pos { color: #00E676; }
    .port-summary .neg { color: #FF5252; }
    .port-summary .neu { color: #D8EEFB; }
    .pos-row {
      display: grid;
      grid-template-columns: 44px 28px 1fr 1fr;
      gap: 2px 4px;
      align-items: center;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .pos-sym { color: #00E5FF; font-weight: bold; }
    .pos-sh  { color: #6E8AA8; text-align: right; }
    .pos-price { color: #A8C0D8; text-align: right; }
    .pos-pnl   { text-align: right; font-weight: bold; }
    .pos-pnl.pos { color: #00E676; }
    .pos-pnl.neg { color: #FF5252; }

    /* ── F2 Debug Overlay ── */
    #debug-overlay {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 230px;
      background: rgba(0, 8, 4, 0.95);
      border: 1px solid rgba(0, 229, 100, 0.45);
      border-radius: 3px;
      padding: 10px 12px;
      color: #00E676;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.75;
      z-index: 999;
      pointer-events: none;
      display: none;
    }
    #debug-overlay .dbg-title {
      color: #00E5FF;
      font-size: 10px;
      letter-spacing: 3px;
      border-bottom: 1px solid rgba(0, 229, 100, 0.25);
      padding-bottom: 5px;
      margin-bottom: 7px;
    }
    #debug-overlay .dbg-row { color: #6E8AA8; }
    #debug-overlay .dbg-val { color: #00E676; }

    /* ── LED 螢幕 overlay ── */
    #led-overlay {
      position: absolute;
      left: 56.5%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 26vw;
      height: calc(26vw * 9 / 16);
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 8px;
      z-index: 10;
      opacity: 1;
      transition: opacity 0.35s ease;
    }
    #led-overlay.fading { opacity: 0; }
    #led-topic-label {
      color: #FF6B35;
      font-size: 1.2vw;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255,107,53,0.9);
      text-align: center;
      line-height: 1.3;
      max-width: 90%;
      padding: 4px 12px;
      background: rgba(20, 8, 3, 0.82);
      border: 1px solid rgba(255,107,53,0.5);
      border-radius: 2px;
    }
    #led-topic-text {
      color: #E8F4FF;
      font-size: 1.7vw;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-align: center;
      line-height: 1.4;
      max-width: 90%;
      text-shadow: 0 0 14px rgba(220,240,255,0.85), 0 0 30px rgba(100,180,255,0.4);
      padding: 6px 10px;
    }
    #led-mode-badge {
      font-size: 0.9vw;
      letter-spacing: 3px;
      padding: 3px 12px;
      border-radius: 2px;
      background: rgba(10, 20, 35, 0.85);
      border: 1px solid rgba(100,150,200,0.3);
      color: #6E8AA8;
    }
    #led-mode-badge.discussing {
      color: #FF6B35;
      border-color: rgba(255,107,53,0.6);
      text-shadow: 0 0 8px rgba(255,107,53,0.7);
      background: rgba(30, 8, 2, 0.85);
    }
    #led-mode-badge.working {
      color: #FFB300;
      border-color: rgba(255,179,0,0.55);
      text-shadow: 0 0 8px rgba(255,179,0,0.65);
      background: rgba(30, 22, 2, 0.85);
    }
    #led-mode-badge.coffee {
      color: #C8A07A;
      border-color: rgba(200,160,122,0.55);
      text-shadow: 0 0 8px rgba(200,160,122,0.5);
      background: rgba(24, 18, 12, 0.85);
    }
  </style>
</head>
<body>
  <div id="header">
    <div>
      <div class="title">◆ 晚晚嘴台灣 WWT</div>
      <div class="subtitle">AI 鄉民聊天室 • Taiwan Tonight LIVE</div>
    </div>
    <div class="live" id="live-status">LIVE</div>
  </div>
  <div id="game-container">
    <div id="status-panel">
      <div class="panel-title">今日話題</div>
      <div id="module-list"></div>
      <div id="update-time">— 等待資料 —</div>
    </div>
    <div id="led-overlay">
      <div id="led-topic-label">📌 今日話題</div>
      <div id="led-topic-text">—</div>
      <div id="led-mode-badge">STANDBY</div>
    </div>
    <div id="debug-overlay">
      <div class="dbg-title">▸ DEBUG  [F2 to hide]</div>
      <div id="dbg-content"></div>
    </div>
    <div id="portfolio-panel" style="display:none">
      <div class="panel-title">Portfolio · 模擬帳戶</div>
      <div id="port-summary"></div>
      <div id="port-positions"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js?v=9"></script>

  <script>
    (function ledOverlay() {
      const overlay = document.getElementById('led-overlay');
      const label   = document.getElementById('led-topic-label');
      const text    = document.getElementById('led-topic-text');
      const badge   = document.getElementById('led-mode-badge');

      // mode → LED 顯示模板（依 GPT Phase 2C Step 4 指令）
      const MODE_VIEWS = {
        idle:       { label: '◆ WWT  Taiwan Tonight', text: '晚晚嘴台灣',   badge: 'STANDBY',      badgeClass: '' },
        discussion: { label: '📌 今日話題',             text: null,           badge: 'ON AIR',       badgeClass: 'discussing' },
        working:    { label: '⚙ 後台準備中',            text: '準備下一話題',  badge: 'WORKING',      badgeClass: 'working' },
        coffee:     { label: '☕ 休息片刻',               text: '茶水間閒聊',   badge: 'COFFEE BREAK', badgeClass: 'coffee' },
      };

      let lastMode  = null;
      let lastTopic = null;

      function applyView(mode, topic) {
        const view = MODE_VIEWS[mode] || MODE_VIEWS.idle;
        label.textContent = view.label;
        // discussion 時用實際 topic（空則退回標題）、其他 mode 用各自固定文字
        text.textContent  = mode === 'discussion' ? (topic || '尚未設定話題') : view.text;
        badge.textContent = view.badge;
        badge.className   = 'led-mode-badge ' + view.badgeClass;
      }

      async function poll() {
        try {
          const r = await fetch('/api/state');
          const d = await r.json();
          const mode  = d.mode  || 'idle';
          const topic = d.topic || '';
          if (mode === lastMode && topic === lastTopic) return;  // 沒變不觸發動畫

          // 首次載入（lastMode 為 null）直接套用、不淡出
          if (lastMode === null) {
            applyView(mode, topic);
          } else {
            // 淡出 → swap 內容 → 淡入
            overlay.classList.add('fading');
            setTimeout(() => {
              applyView(mode, topic);
              overlay.classList.remove('fading');
            }, 350);
          }
          lastMode  = mode;
          lastTopic = topic;
        } catch (_) {}
      }
      poll();
      setInterval(poll, 3000);
    })();
  </script>

  <script>
    (function debugOverlay() {
      const panel   = document.getElementById('debug-overlay');
      const content = document.getElementById('dbg-content');
      let visible = false;
      let cached  = null;

      document.addEventListener('keydown', function(e) {
        if (e.key !== 'F2') return;
        e.preventDefault();
        visible = !visible;
        panel.style.display = visible ? 'block' : 'none';
        if (visible) render();
      });

      function render() {
        if (!cached) {
          content.innerHTML = '<span style="color:#3a5068">— waiting —</span>';
          return;
        }
        const kws = Array.isArray(cached.keywords) && cached.keywords.length > 0
          ? cached.keywords.join(', ')
          : (cached.keywords ? String(cached.keywords) : '—');
        const rows = [
          ['mode',        cached.mode        || '—'],
          ['topic',       cached.topic       || '(none)'],
          ['keywords',    kws],
          ['last_update', cached.updated_at  || '—'],
          ['resolution',  '1920×1080'],
          ['scale',       'FIT'],
        ];
        content.innerHTML = rows.map(([k, v]) =>
          `<div><span class="dbg-row">${k}: </span><span class="dbg-val">${v}</span></div>`
        ).join('');
      }

      async function poll() {
        try {
          const r = await fetch('/api/state');
          if (r.ok) {
            cached = await r.json();
            if (visible) render();
          }
        } catch (_) {}
      }
      poll();
      setInterval(poll, 3000);
    })();
  </script>
</body>
</html>
